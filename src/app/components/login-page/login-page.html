<div class="login-container">
  <div class="ambient-streaks" aria-hidden="true">
    <span></span><span></span><span></span><span></span>
  </div>

  <div class="login-card fade-up">

    <p class="card-eyebrow">The Blog</p>
    <h1>Welcome <span class="gradient-text">Back</span></h1>

    <p class="card-sub">
      Sign in with your username to continue reading and sharing stories beneath purple skies.
    </p>

    <form (ngSubmit)="onSubmit()" #f="ngForm" novalidate>

      <label for="username">Username</label>
      <input
        id="username"
        type="text"
        name="username"
        [(ngModel)]="form.username"
        required
        #username="ngModel"
        autocomplete="username">

      <label for="password">Password</label>
      <input
        id="password"
        type="password"
        name="password"
        [(ngModel)]="form.password"
        required
        #password="ngModel"
        autocomplete="current-password">

      <button type="submit" [disabled]="f.invalid">
        Login
      </button>

    </form>

    <div class="form-footer">
      Don't have an account?
      <a routerLink="/register">Create one</a>
    </div>
    <div class="glow"></div>

  </div>
</div>
